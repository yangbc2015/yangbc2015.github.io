<header class="site-header">
    <nav class="site-nav" role="navigation" aria-label="主导航">
        <a href="{{ .Site.BaseURL }}" class="site-logo">
            <span class="logo-icon">◈</span>
            <span class="logo-text">
                <span class="logo-cn">AI漫游</span>
                <span class="logo-divider"></span>
                <span class="logo-en">WANDER</span>
            </span>
        </a>
        
        <button class="menu-toggle" id="menu-toggle" aria-label="切换菜单">
            ☰
        </button>
        
        <ul class="site-menu" id="site-menu">
            {{ range .Site.Menus.main }}
            <li>
                <a href="{{ .URL }}" {{ if $.IsMenuCurrent "main" . }}aria-current="page"{{ end }}>
                    {{ .Name }}
                </a>
            </li>
            {{ end }}
            {{ if .Site.Params.features.search }}
            <li>
                <button class="search-toggle" id="search-toggle" aria-label="搜索">
                    🔍 <span>搜索</span>
                </button>
            </li>
            {{ end }}
        </ul>
    </nav>
</header>
