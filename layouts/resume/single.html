{{ define "title" }}个人简历 | {{ .Site.Title }}{{ end }}

{{ define "main" }}
<div class="resume-page" style="max-width: 900px; margin: 0 auto; padding: 2rem 1rem;">
    
    <!-- 授权界面（默认显示） -->
    <div id="auth-screen" style="min-height: 60vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;">
        <div style="font-size: 4rem; margin-bottom: 1.5rem; opacity: 0.3;">🔒</div>
        <h1 style="font-size: 1.5rem; color: var(--text-secondary); margin-bottom: 2rem;">需要授权访问</h1>
        
        <!-- 密码输入 -->
        <div style="display: flex; flex-direction: column; align-items: center; gap: 1rem; width: 100%;">
            <input type="password" id="access-code" placeholder="请输入密码" 
                autocomplete="off" 
                readonly
                onfocus="this.removeAttribute('readonly'); this.style.borderColor='var(--neon-green)'; this.style.boxShadow='0 0 10px rgba(0,230,118,0.2)';"
                onblur="this.style.borderColor='var(--border-subtle)'; this.style.boxShadow='none';"
                style="background: var(--dark-bg-secondary); border: 1px solid var(--border-subtle); 
                       color: var(--text-primary); text-align: center; font-size: 1rem; letter-spacing: 0.3rem;
                       padding: 0.75rem 1.5rem; outline: none; width: 200px; border-radius: var(--radius-md);
                       transition: all 0.3s ease;">
            <button id="unlock-btn" class="btn-primary" style="min-width: 120px; display: inline-flex; align-items: center; justify-content: center;">
                解锁
            </button>
        </div>
        
        <!-- 错误提示 -->
        <div id="error-msg" style="color: var(--neon-pink); font-size: 0.9rem; margin-top: 1rem; opacity: 0; transition: opacity 0.3s ease;">
            密码错误，请重试
        </div>
        
        <!-- 返回链接 -->
        <a href="/about/" style="margin-top: 3rem; color: var(--text-muted); text-decoration: none; font-size: 0.9rem; display: flex; align-items: center; gap: 0.3rem; transition: color 0.3s ease;" onmouseover="this.style.color='var(--neon-green)';" onmouseout="this.style.color='var(--text-muted)';">
            <span>←</span> 返回关于我
        </a>
    </div>
    
    <!-- 简历内容（验证后显示） -->
    <div id="resume-content" style="display: none;"></div>
    
</div>

<script>
// 强制清除可能存在的旧解锁状态
sessionStorage.removeItem('resume_unlocked');
sessionStorage.removeItem('resume_access_time');

// 页面加载时立即隐藏简历内容
document.addEventListener('DOMContentLoaded', function() {
    const authScreen = document.getElementById('auth-screen');
    const resumeContent = document.getElementById('resume-content');
    
    if (authScreen) authScreen.style.display = 'flex';
    if (resumeContent) {
        resumeContent.style.display = 'none';
        resumeContent.innerHTML = '';
    }
    
    const input = document.getElementById('access-code');
    if (input) input.value = '';
});

// 简历内容 HTML（使用简单字符串避免编码问题）
const resumeHTML = '<header style="text-align:center;margin-bottom:3rem;padding:2rem;background:var(--dark-bg-secondary);border-radius:var(--radius-lg);border:1px solid var(--border-subtle)">' +
    '<div style="font-size:3rem;margin-bottom:1rem">&#128100;</div>' +
    '<h1 style="font-size:2rem;color:var(--neon-green);margin-bottom:.5rem;text-shadow:0 0 20px rgba(0,230,118,.3)">个人简历</h1>' +
    '<p style="color:var(--text-muted);font-size:.9rem">感谢您的访问</p>' +
    '</header>' +
    '<section style="margin-bottom:2.5rem">' +
    '<h2 style="font-size:1.2rem;color:var(--neon-green);margin-bottom:1.5rem;padding-bottom:.5rem;border-bottom:2px solid rgba(0,230,118,.3)">&#128203; 基本信息</h2>' +
    '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:1rem;padding:1.5rem;background:var(--dark-bg-secondary);border-radius:var(--radius-md);border:1px solid var(--border-subtle)">' +
    '<div style="color:var(--text-secondary)"><strong style="color:var(--text-primary);display:block;margin-bottom:.3rem">姓名</strong>您的姓名</div>' +
    '<div style="color:var(--text-secondary)"><strong style="color:var(--text-primary);display:block;margin-bottom:.3rem">职位</strong>您的职位</div>' +
    '<div style="color:var(--text-secondary)"><strong style="color:var(--text-primary);display:block;margin-bottom:.3rem">工作年限</strong>X 年</div>' +
    '<div style="color:var(--text-secondary)"><strong style="color:var(--text-primary);display:block;margin-bottom:.3rem">所在地</strong>您的城市</div>' +
    '</div></section>' +
    '<section style="margin-bottom:2.5rem">' +
    '<h2 style="font-size:1.2rem;color:var(--neon-green);margin-bottom:1.5rem;padding-bottom:.5rem;border-bottom:2px solid rgba(0,230,118,.3)">&#128221; 个人简介</h2>' +
    '<div style="padding:1.5rem;background:var(--dark-bg-secondary);border-radius:var(--radius-md);border:1px solid var(--border-subtle)">' +
    '<p style="color:var(--text-secondary);line-height:1.8;margin:0">这里是个人简介内容，您可以在此介绍自己的专业背景、技能特长、工作经历等信息。<br>感谢您的访问！</p>' +
    '</div></section>' +
    '<section style="margin-bottom:2.5rem">' +
    '<h2 style="font-size:1.2rem;color:var(--neon-green);margin-bottom:1.5rem;padding-bottom:.5rem;border-bottom:2px solid rgba(0,230,118,.3)">&#128188; 工作经历</h2>' +
    '<div style="padding:1.5rem;background:var(--dark-bg-secondary);border-radius:var(--radius-md);border:1px solid var(--border-subtle)">' +
    '<div style="margin-bottom:1.5rem">' +
    '<h3 style="color:var(--text-primary);margin-bottom:.5rem">公司名称</h3>' +
    '<p style="color:var(--text-muted);font-size:.9rem;margin-bottom:.5rem">2020 - 至今 | 职位名称</p>' +
    '<p style="color:var(--text-secondary);line-height:1.6">工作描述和主要成就...</p>' +
    '</div></div></section>' +
    '<section>' +
    '<h2 style="font-size:1.2rem;color:var(--neon-green);margin-bottom:1.5rem;padding-bottom:.5rem;border-bottom:2px solid rgba(0,230,118,.3)">&#9993; 联系方式</h2>' +
    '<div style="padding:1.5rem;background:var(--dark-bg-secondary);border-radius:var(--radius-md);border:1px solid var(--border-subtle)">' +
    '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1rem">' +
    '<div style="color:var(--text-secondary)"><strong style="color:var(--text-primary)">邮箱: </strong>your.email@example.com</div>' +
    '<div style="color:var(--text-secondary)"><strong style="color:var(--text-primary)">GitHub: </strong>github.com/yourname</div>' +
    '</div></div></section>';

// 验证函数
function verifyAccess() {
    const input = document.getElementById('access-code');
    const authScreen = document.getElementById('auth-screen');
    const resumeContent = document.getElementById('resume-content');
    const errorMsg = document.getElementById('error-msg');
    const unlockBtn = document.getElementById('unlock-btn');
    
    const value = input.value.trim().toLowerCase();
    
    // 验证口令（carlos）
    if (value === atob('Y2FybG9z')) {
        unlockBtn.textContent = '解锁成功！';
        unlockBtn.style.background = 'var(--neon-green)';
        
        try {
            resumeContent.innerHTML = resumeHTML;
            
            authScreen.style.display = 'none';
            resumeContent.style.display = 'block';
            resumeContent.style.opacity = '0';
            resumeContent.style.transform = 'translateY(20px)';
            resumeContent.style.transition = 'all 0.5s ease';
            
            setTimeout(() => {
                resumeContent.style.opacity = '1';
                resumeContent.style.transform = 'translateY(0)';
            }, 100);
            
        } catch (e) {
            console.error('显示失败:', e);
            showError();
        }
    } else {
        showError();
    }
}

function showError() {
    const errorMsg = document.getElementById('error-msg');
    const input = document.getElementById('access-code');
    
    errorMsg.style.opacity = '1';
    input.style.borderColor = 'var(--neon-pink)';
    input.value = '';
    input.focus();
    
    setTimeout(() => {
        errorMsg.style.opacity = '0';
        input.style.borderColor = 'var(--border-subtle)';
    }, 2000);
}

// 延迟启用解锁
let unlockEnabled = false;
setTimeout(() => {
    unlockEnabled = true;
    document.getElementById('access-code').value = '';
}, 500);

// 包装验证函数
const originalVerifyAccess = verifyAccess;
window.verifyAccess = function() {
    if (!unlockEnabled) {
        console.log('解锁功能尚未启用');
        return;
    }
    originalVerifyAccess();
};

// 绑定事件
document.getElementById('unlock-btn').addEventListener('click', () => window.verifyAccess());
document.getElementById('access-code').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') window.verifyAccess();
});
</script>
{{ end }}
