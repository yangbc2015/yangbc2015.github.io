<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode | default "zh-CN" }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ block "title" . }}{{ .Site.Title }}{{ end }}</title>
    
    {{ block "meta" . }}
    <meta name="description" content="{{ .Site.Params.description }}">
    <meta name="author" content="{{ .Site.Params.author }}">
    {{ end }}

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌿</text></svg>">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">

    <!-- D3.js -->
    <script src="https://d3js.org/d3.v7.min.js"></script>

    {{ block "styles" . }}
    <style>
        :root {
            --neon-green: {{ .Site.Params.colors.neon_green | default "#00ff41" }};
            --neon-green-dim: {{ .Site.Params.colors.neon_green_dim | default "#00cc33" }};
            --neon-green-glow: rgba(0, 255, 65, 0.6);
            --dark-bg: {{ .Site.Params.colors.dark_bg | default "#0a0a0a" }};
            --dark-bg-secondary: {{ .Site.Params.colors.dark_bg_secondary | default "#0d1117" }};
            --dark-bg-tertiary: #161b22;
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --grid-color: rgba(0, 255, 65, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--dark-bg);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
            line-height: 1.6;
        }

        /* 赛博朋克网格背景 */
        .cyber-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 0;
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            0% { transform: perspective(500px) rotateX(60deg) translateY(0); }
            100% { transform: perspective(500px) rotateX(60deg) translateY(50px); }
        }

        /* 扫描线效果 */
        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 255, 65, 0.03) 2px,
                rgba(0, 255, 65, 0.03) 4px
            );
            pointer-events: none;
            z-index: 1000;
        }

        /* 主容器 */
        .container {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 导航栏 */
        .site-nav {
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--neon-green-dim);
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .site-logo {
            font-family: 'Orbitron', monospace;
            font-size: 1.2rem;
            color: var(--neon-green);
            text-decoration: none;
            font-weight: 700;
            text-shadow: 0 0 10px var(--neon-green-glow);
        }

        .site-menu {
            display: flex;
            gap: 2rem;
            list-style: none;
        }

        .site-menu a {
            color: var(--text-secondary);
            text-decoration: none;
            font-family: 'Orbitron', monospace;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: all 0.3s ease;
            position: relative;
        }

        .site-menu a:hover,
        .site-menu a[aria-current="page"] {
            color: var(--neon-green);
            text-shadow: 0 0 10px var(--neon-green-glow);
        }

        .site-menu a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--neon-green);
            transition: width 0.3s ease;
            box-shadow: 0 0 10px var(--neon-green);
        }

        .site-menu a:hover::after,
        .site-menu a[aria-current="page"]::after {
            width: 100%;
        }

        /* 移动端菜单按钮 */
        .menu-toggle {
            display: none;
            background: transparent;
            border: 2px solid var(--neon-green);
            color: var(--neon-green);
            padding: 0.5rem;
            cursor: pointer;
            font-family: 'Orbitron', monospace;
        }

        /* 主要内容 */
        main {
            flex: 1;
        }

        /* 页脚 */
        footer {
            padding: 2rem;
            text-align: center;
            border-top: 1px solid var(--neon-green-dim);
            background: var(--dark-bg-secondary);
        }

        .footer-content {
            max-width: 1200px;
            margin: 0 auto;
        }

        .footer-text {
            font-family: 'Orbitron', monospace;
            font-size: 0.8rem;
            color: var(--text-secondary);
            letter-spacing: 0.2em;
            margin-bottom: 1rem;
        }

        .footer-text span {
            color: var(--neon-green);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .footer-social {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin-top: 1rem;
        }

        .footer-social a {
            color: var(--text-secondary);
            font-size: 1.2rem;
            transition: all 0.3s ease;
        }

        .footer-social a:hover {
            color: var(--neon-green);
            text-shadow: 0 0 10px var(--neon-green-glow);
            transform: translateY(-3px);
        }

        /* 滚动条样式 */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--dark-bg);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--neon-green-dim);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--neon-green);
        }

        /* 加载动画 */
        .loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--dark-bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        .loader.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .loader-text {
            font-family: 'Orbitron', monospace;
            font-size: 1.5rem;
            color: var(--neon-green);
            margin-top: 1rem;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .loader-bar {
            width: 200px;
            height: 4px;
            background: var(--dark-bg-tertiary);
            border-radius: 2px;
            overflow: hidden;
            margin-top: 1rem;
        }

        .loader-progress {
            width: 0%;
            height: 100%;
            background: var(--neon-green);
            box-shadow: 0 0 10px var(--neon-green);
            animation: loading 2s ease-in-out infinite;
        }

        @keyframes loading {
            0% { width: 0%; margin-left: 0%; }
            50% { width: 100%; margin-left: 0%; }
            100% { width: 0%; margin-left: 100%; }
        }

        /* Glitch 效果 */
        .glitch-text {
            font-family: 'Orbitron', monospace;
            font-size: 2rem;
            font-weight: 700;
            color: var(--neon-green);
            text-shadow: 0 0 10px var(--neon-green-glow);
            position: relative;
            display: inline-block;
        }

        .glitch-text::before,
        .glitch-text::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .glitch-text::before {
            animation: glitch-1 2s infinite;
            color: #ff00ff;
            z-index: -1;
        }

        .glitch-text::after {
            animation: glitch-2 2s infinite;
            color: #00ffff;
            z-index: -2;
        }

        @keyframes glitch-1 {
            0%, 100% { clip-path: inset(0 0 0 0); transform: translate(0); }
            20% { clip-path: inset(20% 0 60% 0); transform: translate(-3px, 0); }
            40% { clip-path: inset(40% 0 40% 0); transform: translate(3px, 0); }
            60% { clip-path: inset(60% 0 20% 0); transform: translate(-3px, 0); }
            80% { clip-path: inset(80% 0 0% 0); transform: translate(3px, 0); }
        }

        @keyframes glitch-2 {
            0%, 100% { clip-path: inset(0 0 0 0); transform: translate(0); }
            20% { clip-path: inset(60% 0 20% 0); transform: translate(3px, 0); }
            40% { clip-path: inset(40% 0 40% 0); transform: translate(-3px, 0); }
            60% { clip-path: inset(20% 0 60% 0); transform: translate(3px, 0); }
            80% { clip-path: inset(0% 0 80% 0); transform: translate(-3px, 0); }
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .site-nav {
                padding: 1rem;
            }

            .site-menu {
                display: none;
                position: absolute;
                top: 100%;
                left: 0;
                right: 0;
                flex-direction: column;
                background: var(--dark-bg-secondary);
                padding: 1rem;
                gap: 1rem;
                border-bottom: 1px solid var(--neon-green-dim);
            }

            .site-menu.active {
                display: flex;
            }

            .menu-toggle {
                display: block;
            }
        }
    </style>
    {{ end }}

    {{ block "extra-head" . }}{{ end }}
</head>
<body>
    <!-- 加载动画 -->
    <div class="loader" id="loader">
        <div class="glitch-text" data-text="LOADING">LOADING</div>
        <div class="loader-bar">
            <div class="loader-progress"></div>
        </div>
        <div class="loader-text">初始化数字花园...</div>
    </div>

    <!-- 背景效果 -->
    <div class="cyber-grid"></div>
    <div class="scanlines"></div>

    <!-- 主容器 -->
    <div class="container">
        {{ partial "header.html" . }}

        <main>
            {{ block "main" . }}{{ end }}
        </main>

        {{ partial "footer.html" . }}
    </div>

    {{ block "scripts" . }}{{ end }}

    <script>
        // 页面加载完成后隐藏 loader
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('loader').classList.add('hidden');
            }, 800);
        });

        // 移动端菜单切换
        const menuToggle = document.getElementById('menu-toggle');
        const siteMenu = document.getElementById('site-menu');
        if (menuToggle && siteMenu) {
            menuToggle.addEventListener('click', () => {
                siteMenu.classList.toggle('active');
            });
        }
    </script>
</body>
</html>
