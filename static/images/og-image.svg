<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0a0a"/>
  
  <!-- Grid pattern -->
  <defs>
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#00ff41" stroke-width="0.5" opacity="0.3"/>
    </pattern>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff41;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#00f0ff;stop-opacity:0.1" />
    </linearGradient>
  </defs>
  
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  
  <!-- Logo emoji -->
  <text x="600" y="280" font-size="180" text-anchor="middle">🍀</text>
  
  <!-- Title -->
  <text x="600" y="420" font-family="monospace" font-size="72" font-weight="bold" text-anchor="middle" fill="#00ff41">AI漫游</text>
  <text x="600" y="480" font-family="monospace" font-size="36" text-anchor="middle" fill="#00f0ff">| AI Wander</text>
  
  <!-- Subtitle -->
  <text x="600" y="540" font-family="sans-serif" font-size="24" text-anchor="middle" fill="#8b949e">专注 AI 领域的研究站</text>
  
  <!-- Decorative elements -->
  <rect x="100" y="100" width="100" height="100" fill="none" stroke="#00ff41" stroke-width="2" opacity="0.5"/>
  <rect x="1000" y="100" width="100" height="100" fill="none" stroke="#00f0ff" stroke-width="2" opacity="0.5"/>
  <rect x="100" y="430" width="100" height="100" fill="none" stroke="#00f0ff" stroke-width="2" opacity="0.5"/>
  <rect x="1000" y="430" width="100" height="100" fill="none" stroke="#00ff41" stroke-width="2" opacity="0.5"/>
</svg>
