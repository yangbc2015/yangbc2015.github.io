baseURL = 'https://yangbc2015.github.io'
languageCode = 'zh-CN'
defaultContentLanguage = 'zh'
title = 'AI漫游 | AI Wander'
# 使用自定义布局，不依赖主题
theme = ''

# 分页设置
[pagination]
  pagerSize = 6

[params]
  author = "Garden Keeper"
  description = "专注 AI 领域的研究站，汇聚学术前沿、技术博客、AI 榜单与资源导航"
  favicon = "/favicon.ico"
  # site_logo = "/logo.png"  # 使用emoji 🍀 作为logo
  mainSections = ["nodes", "posts", "news", "papers", "tutorials", "videos", "tools", "investment"]
  
  # 赛博朋克主题配色
  [params.colors]
    neon_green = "#00ff41"
    neon_green_dim = "#00cc33"
    neon_blue = "#00f0ff"
    neon_pink = "#ff00ff"
    dark_bg = "#0a0a0a"
    dark_bg_secondary = "#0d1117"
    text_primary = "#e6edf3"
    text_secondary = "#8b949e"

  # 社交媒体链接
  [params.social]
    github = "https://github.com"
    twitter = "https://twitter.com"
    email = "mailto:hello@example.com"
    rss = true

  # 功能开关
  [params.features]
    graph_visualization = true
    dark_mode = true
    particles = true
    search = true
    comments = true
    reading_progress = true
    back_to_top = true
    code_copy = true
    rss = true

  # Giscus 评论配置
  # 配置指南: https://giscus.app 或查看 GISCUS_SETUP.md
  [params.giscus]
    repo = ""           # 格式: "用户名/仓库名"
    repoId = ""         # 从 https://giscus.app 获取
    category = "Announcements"
    categoryId = ""     # 从 https://giscus.app 获取
    mapping = "pathname"
    reactionsEnabled = "1"
    emitMetadata = "0"
    theme = "dark"
    lang = "zh-CN"

# 主菜单
[menu]
  [[menu.main]]
    name = '首页'
    url = '/'
    weight = 10
  [[menu.main]]
    name = '📰 AI新闻'
    url = '/news/'
    weight = 20
  [[menu.main]]
    name = '🤖 机器人'
    url = '/robotics/'
    weight = 22
  [[menu.main]]
    name = '🏆 AI榜单'
    url = '/leaderboard/'
    weight = 25
  [[menu.main]]
    name = '💰 投资'
    url = '/investment/'
    weight = 28
  [[menu.main]]
    name = '🔬 学术'
    url = '/papers/'
    weight = 30
  [[menu.main]]
    name = '🏗️ 技术基建'
    url = '/tutorials/'
    weight = 40
  [[menu.main]]
    name = '🛠️ 工具'
    url = '/tools/'
    weight = 60
  [[menu.main]]
    name = '🎬 视频'
    url = '/videos/'
    weight = 70
  [[menu.main]]
    name = '📊 归档'
    url = '/archive/'
    weight = 80
  [[menu.main]]
    name = '👤 关于我们'
    url = '/about/'
    weight = 90
  [[menu.main]]
    name = '🔗 友链'
    url = '/friends/'
    weight = 91
    parent = '👤 关于我们'

# 页脚菜单
  [[menu.footer]]
    name = 'RSS'
    url = '/index.xml'
    weight = 10
  [[menu.footer]]
    name = '统计'
    url = '/stats/'
    weight = 20
  [[menu.footer]]
    name = 'Sitemap'
    url = '/sitemap.xml'
    weight = 30

[taxonomies]
  tag = "tags"
  category = "categories"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    style = "dracula"
    lineNos = true
    lineNumbersInTable = true
    noClasses = false
    codeFences = true
    guessSyntax = true

[imaging]
  quality = 90
  resampleFilter = "lanczos"

[build]
  writeStats = true

[outputs]
  home = ["HTML", "RSS", "JSON"]
  section = ["HTML", "RSS"]

[outputFormats]
  [outputFormats.JSON]
    mediaType = "application/json"
    baseName = "index"
    isPlainText = true
