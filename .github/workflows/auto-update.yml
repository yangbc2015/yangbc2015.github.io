name: 🤖 Auto Update AI Data

on:
  schedule:
    # 每天北京时间早上 8 点运行 (UTC 00:00)
    - cron: '0 0 * * *'
  # 允许手动触发
  workflow_dispatch:

# 确保不会与其他部署冲突
concurrency:
  group: "pages"
  cancel-in-progress: false

# Use Node.js 24 for JavaScript actions
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      has_changes: ${{ steps.check_changes.outputs.has_changes }}
      update_status: ${{ steps.update_status.outputs.status }}
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install dependencies
      id: install_deps
      run: |
        cd scripts/scraper
        pip install -r requirements.txt || {
          echo "::error::Failed to install Python dependencies"
          exit 1
        }
    
    - name: Run scrapers
      id: run_scrapers
      continue-on-error: true
      timeout-minutes: 15
      run: |
        cd scripts/scraper
        set +e
        python3 scraper.py
        exit_code=$?
        set -e
        if [ "$exit_code" -ne 0 ]; then
          echo "Scraper completed with some errors"
        fi
        echo "exit_code=$exit_code" >> $GITHUB_OUTPUT
    
    - name: Check scraper status
      id: update_status
      run: |
        if [ "${{ steps.run_scrapers.outputs.exit_code }}" == "0" ]; then
          echo "status=success" >> $GITHUB_OUTPUT
          echo "✅ Scraper completed successfully"
        else
          echo "status=partial" >> $GITHUB_OUTPUT
          echo "⚠️ Scraper had some errors but continuing..."
        fi
    
    - name: Check for changes
      id: check_changes
      run: |
        git status
        if [ -n "$(git status --porcelain data/ content/)" ]; then
          echo "has_changes=true" >> $GITHUB_OUTPUT
          echo "📦 Changes detected in data/ or content/"
          git diff --stat data/ content/ || true
        else
          echo "has_changes=false" >> $GITHUB_OUTPUT
          echo "ℹ️ No changes to commit"
        fi
    
    - name: Commit and push changes
      if: steps.check_changes.outputs.has_changes == 'true'
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add data/ content/
        printf '%s\n\n%s\n%s\n%s\n%s\n%s\n%s\n\n%s\n' \
          "🤖 Auto-update AI data: $(date +'%Y-%m-%d')" \
          "📊 更新内容:" \
          "- AI 新闻" \
          "- AI 榜单 (LMSYS Arena)" \
          "- AI 论文 (arXiv)" \
          "- AI 视频" \
          "- AI 投资资讯" \
          "Status: ${{ steps.update_status.outputs.status }}" \
          | git commit -F -
        git push
    
    - name: Summary
      run: |
        echo "## 🤖 Auto Update Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- **Status**: ${{ steps.update_status.outputs.status }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Changes Detected**: ${{ steps.check_changes.outputs.has_changes }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Time**: $(date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_STEP_SUMMARY

  build-and-deploy:
    needs: update-data
    runs-on: ubuntu-latest
    # 只要有更改就部署，不管爬虫是否部分失败
    if: always() && needs.update-data.outputs.has_changes == 'true'
    
    # 添加权限以部署到 GitHub Pages
    permissions:
      contents: read
      pages: write
      id-token: write
    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Setup Pages
      id: pages
      uses: actions/configure-pages@v5
    
    - name: Setup Hugo
      uses: peaceiris/actions-hugo@v3
      with:
        hugo-version: 'latest'
        extended: true
    
    - name: Build
      env:
        HUGO_ENVIRONMENT: production
        TZ: Asia/Shanghai
      run: hugo --minify --gc --baseURL "${{ steps.pages.outputs.base_url }}/"
    
    - name: Check build output
      run: |
        ls -la public/
        echo "✅ Build completed"
    
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: ./public
    
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
