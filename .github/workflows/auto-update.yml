name: 🤖 Auto Update AI Data

on:
  schedule:
    # 每天北京时间早上 8 点运行 (UTC 00:00)
    - cron: '0 0 * * *'
  # 允许手动触发
  workflow_dispatch:
  # 在 push 到 main 分支时也触发（用于测试）
  push:
    branches:
      - main
    paths:
      - '.github/workflows/auto-update.yml'
      - 'scripts/scraper/**'

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      has_changes: ${{ steps.check_changes.outputs.has_changes }}
      update_status: ${{ steps.update_status.outputs.status }}
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install dependencies
      id: install_deps
      run: |
        cd scripts/scraper
        pip install -r requirements.txt || {
          echo "::error::Failed to install Python dependencies"
          exit 1
        }
    
    - name: Run scrapers
      id: run_scrapers
      continue-on-error: true
      run: |
        cd scripts/scraper
        python scraper.py
        echo "exit_code=$?" >> $GITHUB_OUTPUT
    
    - name: Check scraper status
      id: update_status
      run: |
        if [ "${{ steps.run_scrapers.outputs.exit_code }}" == "0" ]; then
          echo "status=success" >> $GITHUB_OUTPUT
          echo "✅ Scraper completed successfully"
        else
          echo "status=partial" >> $GITHUB_OUTPUT
          echo "⚠️ Scraper had some errors but continuing..."
        fi
    
    - name: Check for changes
      id: check_changes
      run: |
        git status
        if [ -n "$(git status --porcelain data/ content/)" ]; then
          echo "has_changes=true" >> $GITHUB_OUTPUT
          echo "📦 Changes detected in data/ or content/"
          git diff --stat data/ content/ || true
        else
          echo "has_changes=false" >> $GITHUB_OUTPUT
          echo "ℹ️ No changes to commit"
        fi
    
    - name: Commit and push changes
      if: steps.check_changes.outputs.has_changes == 'true'
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add data/ content/
        git commit -m "🤖 Auto-update AI data: $(date +'%Y-%m-%d %H:%M')

📊 更新内容:
- AI 新闻
- AI 榜单 (LMSYS Arena)
- AI 论文 (arXiv)
- AI 视频
- AI 投资资讯

Status: ${{ steps.update_status.outputs.status }}"
        git push
    
    - name: Summary
      run: |
        echo "## 🤖 Auto Update Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- **Status**: ${{ steps.update_status.outputs.status }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Changes Detected**: ${{ steps.check_changes.outputs.has_changes }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Time**: $(date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_STEP_SUMMARY

  build-and-deploy:
    needs: update-data
    runs-on: ubuntu-latest
    # 只要数据更新成功就构建，不管爬虫是否部分失败
    if: always() && needs.update-data.outputs.has_changes == 'true'
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Setup Hugo
      uses: peaceiris/actions-hugo@v3
      with:
        hugo-version: 'latest'
        extended: true
    
    - name: Build
      run: hugo --minify --gc
    
    - name: Check build output
      run: |
        ls -la public/
        echo "✅ Build completed"
    
    # 如果需要部署到 GitHub Pages，取消下面的注释
    # - name: Deploy
    #   uses: peaceiris/actions-gh-pages@v4
    #   if: github.ref == 'refs/heads/main'
    #   with:
    #     github_token: ${{ secrets.GITHUB_TOKEN }}
    #     publish_dir: ./public
